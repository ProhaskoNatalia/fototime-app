<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Fototime AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .card {
      margin: 12px auto;
      width: 90%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      cursor: pointer;
      background: #fff;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .card p {
      margin: 10px;
      font-weight: 500;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 16px;
      width: 90%;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(90deg,#2c83ed,#6a5cea);
      color: white;
    }

    .secondary {
      background: #f3f4f6;
      color: #111;
    }

    input {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>✨ Fototime AI</h1>

<div id="step1">
  <h3>Выбери персонажа 👇</h3>
  <button class="btn" onclick="selectGender('Девушка')">👩 Девушка</button>
  <button class="btn" onclick="selectGender('Парень')">👨 Парень</button>
  <button class="btn" onclick="selectGender('Невеста')">👰 Невеста</button>
  <button class="btn" onclick="selectGender('Жених')">🤵 Жених</button>
</div>

<div id="step2" style="display:none;">
  <h3>Выбери стиль 👇</h3>

  <div class="card" onclick="selectStyle('Киберпанк')">
    <img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f" />
    <p>⚡ Киберпанк</p>
  </div>

  <div class="card" onclick="selectStyle('СССР')">
    <img src="https://images.unsplash.com/photo-1529101091764-c3526daf38fe" />
    <p>🏛 Назад в СССР</p>
  </div>

  <div class="card" onclick="selectStyle('Будущее')">
    <img src="https://images.unsplash.com/photo-1535223289827-42f1e9919769" />
    <p>🌆 Город будущего</p>
  </div>

  <button class="btn secondary" onclick="backToGender()">⬅️ Назад</button>
</div>
  
<div id="step3" style="display:none;">
  <h3>Загрузи фото 📸</h3>
  <input type="file" id="photoInput" accept="image/*"/>

  <button class="btn" onclick="sendData()">Создать фото</button>
  <button class="btn secondary" onclick="backToStyle()">⬅️ Назад</button>
</div>

<script>
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();

  let gender = "";
  let style = "";

  function selectGender(g) {
    gender = g;
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
  }

  function selectStyle(s) {
    style = s;
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";
  }

  function backToGender() {
    document.getElementById("step2").style.display = "none";
    document.getElementById("step1").style.display = "block";
  }

  function backToStyle() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("step2").style.display = "block";
  }

  async function sendData() {
  const fileInput = document.getElementById("photoInput");

  if (!fileInput.files.length) {
    alert("Загрузи фото");
    return;
  }

  const formData = new FormData();
  formData.append("image", fileInput.files[0]);
  formData.append("gender", gender);
  formData.append("style", style);

  try {
    const response = await fetch("https://fototime-app-production.up.railway.app/generate", {
      method: "POST",
      body: formData
    });

    const result = await response.json();

    console.log(result);

    if (result.image) {
      document.body.innerHTML += `
        <img src="${result.image}" style="width:90%;margin-top:20px;border-radius:12px"/>
      `;
    } else {
      alert("Ошибка генерации");
    }

  } catch (error) {
    console.error(error);
    alert("Ошибка 😢");
  }
}
</script>

</body>
</html>
