<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system;
  background: #f2f2f7;
  text-align: center;
  padding: 20px;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(90deg,#2c83ed,#6a5cea);
  color: white;
  font-size: 16px;
  margin-top: 10px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h2>✨ Fototime AI</h2>

<div class="card">
<input type="file" id="photoInput"><br>

<select id="gender">
  <option value="woman">Женщина</option>
  <option value="man">Мужчина</option>
</select>

<select id="style">
  <option value="cinematic">Кино</option>
  <option value="neon">Неон</option>
</select>

<button onclick="send()">Создать фото</button>
</div>

<img id="result" style="width:100%;margin-top:20px;border-radius:20px"/>

<script>
async function send() {
  const file = document.getElementById("photoInput").files[0];

  const formData = new FormData();
  formData.append("image", file);
  formData.append("gender", document.getElementById("gender").value);
  formData.append("style", document.getElementById("style").value);

  const res = await fetch("https://fototime-app-production.up.railway.app/generate", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.image) {
    document.getElementById("result").src = data.image;
  } else {
    alert("Ошибка");
  }
}
</script>

</body>
</html>  <button class="btn" onclick="selectGender('Жених')">🤵 Жених</button>
</div>

<div id="step2" style="display:none;">
  <h3>Выбери стиль 👇</h3>

  <div class="card" onclick="selectStyle('Киберпанк')">
    <img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f" />
    <p>⚡ Киберпанк</p>
  </div>

  <div class="card" onclick="selectStyle('СССР')">
    <img src="https://images.unsplash.com/photo-1529101091764-c3526daf38fe" />
    <p>🏛 Назад в СССР</p>
  </div>

  <div class="card" onclick="selectStyle('Будущее')">
    <img src="https://images.unsplash.com/photo-1535223289827-42f1e9919769" />
    <p>🌆 Город будущего</p>
  </div>

  <button class="btn secondary" onclick="backToGender()">⬅️ Назад</button>
</div>
  
<div id="step3" style="display:none;">
  <h3>Загрузи фото 📸</h3>
  <input type="file" id="photoInput" accept="image/*"/>

  <button class="btn" onclick="sendData()">Создать фото</button>
  <button class="btn secondary" onclick="backToStyle()">⬅️ Назад</button>
</div>

<script>
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();

  let gender = "";
  let style = "";

  function selectGender(g) {
    gender = g;
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
  }

  function selectStyle(s) {
    style = s;
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";
  }

  function backToGender() {
    document.getElementById("step2").style.display = "none";
    document.getElementById("step1").style.display = "block";
  }

  function backToStyle() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("step2").style.display = "block";
  }

  async function sendData() {
  const fileInput = document.getElementById("photoInput");

  if (!fileInput.files.length) {
    alert("Загрузи фото");
    return;
  }

  const formData = new FormData();
  formData.append("image", fileInput.files[0]);
  formData.append("gender", gender);
  formData.append("style", style);

  try {
    const response = await fetch("https://fototime-app-production.up.railway.app/generate", {
      method: "POST",
      body: formData
    });

    const result = await response.json();

    console.log(result);

    if (result.image) {
      document.body.innerHTML += `
        <img src="${result.image}" style="width:90%;margin-top:20px;border-radius:12px"/>
      `;
    } else {
      alert("Ошибка генерации");
    }

  } catch (error) {
    console.error(error);
    alert("Ошибка 😢");
  }
}
</script>

</body>
</html>
