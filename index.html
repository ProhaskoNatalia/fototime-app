<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Fototime AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 16px;
      width: 90%;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(90deg,#2c83ed,#6a5cea);
      color: white;
      font-weight: 500;
    }

    .secondary {
      background: #f3f4f6;
      color: #111;
    }

    .hidden {
      display: none;
    }

    input {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>✨ Fototime AI</h1>
<p>Создай уникальное фото за 1 минуту</p>

<div id="step1">
  <h3>Выбери персонажа 👇</h3>
  <button class="btn" onclick="selectGender('Девушка')">👩 Девушка</button>
  <button class="btn" onclick="selectGender('Парень')">👨 Парень</button>
  <button class="btn" onclick="selectGender('Невеста')">👰 Невеста</button>
  <button class="btn" onclick="selectGender('Жених')">🤵 Жених</button>
</div>

<div id="step2" class="hidden">
  <h3>Выбери стиль 👇</h3>
  <button class="btn" onclick="selectStyle('Киберпанк')">⚡ Киберпанк</button>
  <button class="btn" onclick="selectStyle('СССР')">🏛 Назад в СССР</button>
  <button class="btn" onclick="selectStyle('Будущее')">🌆 Город будущего</button>
  <button class="btn secondary" onclick="backToGender()">⬅️ Назад</button>
</div>

<div id="step3" class="hidden">
  <h3>Загрузи фото 📸</h3>
  <input type="file" id="photoInput" accept="image/*"/>
  <button class="btn" onclick="sendData()">Отправить</button>
  <button class="btn secondary" onclick="backToStyle()">⬅️ Назад</button>
</div>

<script>
  // 👇 ВАЖНО ДЛЯ TELEGRAM
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();

  let gender = "";
  let style = "";

  function selectGender(g) {
    gender = g;
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
  }

  function selectStyle(s) {
    style = s;
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";
  }

  function backToGender() {
    document.getElementById("step2").style.display = "none";
    document.getElementById("step1").style.display = "block";
  }

  function backToStyle() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("step2").style.display = "block";
  }

  function sendData() {
    const fileInput = document.getElementById("photoInput");

    if (!fileInput.files.length) {
      alert("Пожалуйста, загрузи фото");
      return;
    }

    const data = {
      gender: gender,
      style: style
    };

    Telegram.WebApp.sendData(JSON.stringify(data));
    Telegram.WebApp.close();
  }
</script>

</body>
</html>
